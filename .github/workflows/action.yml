name: Build and Deploy Qt Project

on:
  push:
    branches:
      - main

jobs:
  windows:
    runs-on: windows-2022
    env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure Developer Command Prompt for Microsoft Visual C++
        uses: ilammy/msvc-dev-cmd@v1

      - name: Extract version number
        id: extract_version
        run: |
          $full_version = (Select-String -Path VDVGE.pro -Pattern 'win32:VERSION = (\d+\.\d+\.\d+\.\d+)' | ForEach-Object { $_.Matches[0].Groups[1].Value })
          $version = $full_version -replace '\.\d+$'
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Print extracted version number
        run: |
           echo "VERSION=${{ env.VERSION }}"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.1.*'
          version: '6.8.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qt5compat'

      - name: Build project
        run: |
          qmake6 -spec win32-msvc
          nmake

      - name: Deploy (Windows)
        run: |
          windeployqt --release build\vdvge.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: vdvge-${{ env.VERSION }}-qt6-windows-x64
          path: |
            build/*

  mac-qt6:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version number
        id: extract_version
        run: |
          version=$(sed -n 's/^else:VERSION = //p' VDVGE.pro)
          echo "Extracted version: $version"
          echo "VERSION=$version" >> $GITHUB_ENV

      - name: Print extracted version number
        run: |
           echo "VERSION=${{ env.VERSION }}"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.1.*'
          version: '6.8.0'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qt5compat'

      - name: Build project
        run: |
          qmake -spec macx-xcode
          xcodebuild -project VDVGE.xcodeproj

      - name: Check the target platform of the built binary
        run: |
          file build/vdvge.app/Contents/MacOS/vdvge
  
      - name: Deploy
        run: |
          (cd build && macdeployqt vdvge.app -codesign=- -dmg)
          mv build/vdvge.dmg build/vdvge-${{ env.VERSION }}-qt6-macos.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: vdvge-${{ env.VERSION }}-qt6-macos
          path: |
            build/*.dmg

  mac-qt5:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version number
        id: extract_version
        run: |
          version=$(sed -n 's/^else:VERSION = //p' VDVGE.pro)
          echo "Extracted version: $version"
          echo "VERSION=$version" >> $GITHUB_ENV

      - name: Print extracted version number
        run: |
           echo "VERSION=${{ env.VERSION }}"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.1.*'
          version: '5.15.19'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'

      - name: Build project
        run: |
          sudo xcode-select --switch /Applications/Xcode_16.4.app
          PATH=/Application/Qt/5.15.2/clang_64/bin:$PATH
          export PATH
          qmake
          make

      - name: Check the target platform of the built binary
        run: |
          file build/vdvge.app/Contents/MacOS/vdvge
  
      - name: Deploy
        run: |
          cd build
          macdeployqt vdvge.app -no-strip
          find vdvge.app/Contents/Frameworks -type f -name "*.dylib" -or -name "*.framework" | while read -r file; do
            codesign --force --timestamp --options=runtime --sign "$DEVELOPER_ID_APPLICATION" "$file"
          done
          find vdvge.app/Contents/PlugIns -type f -name "*.dylib" | while read -r file; do
            codesign --force --timestamp --options=runtime --sign "$DEVELOPER_ID_APPLICATION" "$file"
          done
          codesign --force --timestamp --options=runtime --sign "$DEVELOPER_ID_APPLICATION" vdvge.app
          create-dmg \
            --volname "vdvge" \
            --window-size 500 300 \
            --icon-size 100 \
            --icon "vdvge.app" 175 120 \
            --hide-extension "vdvge.app" \
            --app-drop-link 325 120 \
            "vdvge-${{ env.VERSION }}-qt5-macos.dmg" \
            "vdvge.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: vdvge-${{ env.VERSION }}-qt5-macos
          path: |
            build/*.dmg

  ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version number
        id: extract_version
        run: |
          version=$(grep -Po '(?<=else:VERSION = ).*' VDVGE.pro)
          echo "Extracted version: $version"
          echo "VERSION=$version" >> $GITHUB_ENV

      - name: Print extracted version number
        run: |
           echo "VERSION=${{ env.VERSION }}"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.1.*'
          version: '6.2.4'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          modules: 'qt5compat'

      - name: Install Libraries
        run: |
          sudo apt-get install -y rpm
          sudo apt-get install -y libglu1-mesa-dev

      - name: Build RPM package
        run: |
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS,TMP_SOURCES}
          mv vdvge.spec rpmbuild/SPECS/
          rsync -a --exclude='rpmbuild' ./ rpmbuild/TMP_SOURCES/vdvge-${{ env.VERSION }}/
          (cd rpmbuild/SOURCES && tar czf vdvge-${{ env.VERSION }}.tar.gz -C ../TMP_SOURCES .)
          rpmbuild -ba --define "_sourcedir $(pwd)/rpmbuild/SOURCES" rpmbuild/SPECS/vdvge.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: vdvge-${{ env.VERSION }}-qt6-ubuntu-x64
          path: |
            /home/runner/rpmbuild/RPMS/*
            /home/runner/rpmbuild/SRPMS/*
